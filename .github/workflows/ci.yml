name: CI - Build, Test & Lint

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  IMAGE_NAME: py-api-service

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run unit tests with coverage
        run: |
          cd api
          python -m pytest tests/ -v --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: api/coverage.xml

  lint:
    name: Lint & Style Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8 pyflakes

      - name: Run flake8
        run: |
          flake8 api/app.py --max-line-length=120 --ignore=E501,W503 --statistics

  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Kubernetes manifests
        run: |
          curl -sLo /tmp/kubectl "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x /tmp/kubectl
          /tmp/kubectl version --client
          /tmp/kubectl apply --dry-run=client -f k8s/namespace.yaml
          /tmp/kubectl apply --dry-run=client -f k8s/configmap.yaml
          /tmp/kubectl apply --dry-run=client -f k8s/db-pvc.yaml
          /tmp/kubectl apply --dry-run=client -f k8s/db-service.yaml
          /tmp/kubectl apply --dry-run=client -f k8s/api-service.yaml
          /tmp/kubectl apply --dry-run=client -f k8s/api-hpa.yaml

  push-docker:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/py-api-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/py-api-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
