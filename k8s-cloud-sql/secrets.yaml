# Kubernetes Secret for Database Credentials
# These values are populated by the deploy-cloud-sql.sh script
# For manual setup, update with your Cloud SQL credentials
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: multi-tier
type: Opaque
stringData:
  # Cloud SQL instance private IP (will be auto-populated)
  db-host: "CLOUD_SQL_PRIVATE_IP"
  # PostgreSQL port
  db-port: "5432"
  # Database name
  db-name: "microservices_db"
  # Database user
  db-user: "dbuser"
  # Database user password (CHANGE THIS IN PRODUCTION)
  db-password: "SecurePassword123!@#"
