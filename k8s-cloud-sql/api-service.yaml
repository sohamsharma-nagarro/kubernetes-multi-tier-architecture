# Kubernetes Service for API Deployment
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: multi-tier
  labels:
    app: api-service
    tier: api
spec:
  type: LoadBalancer
  selector:
    app: api-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
    name: http
